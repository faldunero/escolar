<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolar | Ludo Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css?v=12">
</head>
<body>

  <header class="ludolab-header">
    <div class="banner-wrapper">
      <img src="./imagenes/banner_horizontal.png" alt="Ludolab">
    </div>
  </header>

  <nav class="volver-juegos">
    <a href="https://ludolab.cl/juegos.html" class="btn-volver-juegos">
      ← Volver a juegos
    </a>
  </nav>

  <main id="app">
    <section id="catalogo-view">
      <div class="categoria-seccion">
        <h2 class="titulo-categoria">Animales</h2>
        <div id="grid-animales" class="grid-lupa"></div>
      </div>

      <div class="categoria-seccion">
        <h2 class="titulo-categoria">Números</h2>
        <div id="grid-numeros" class="grid-lupa"></div>
      </div>

      <div class="categoria-seccion">
        <h2 class="titulo-categoria">Colores</h2>
        <div id="grid-colores" class="grid-lupa"></div>
      </div>
    </section>

    <section id="detalle-view" style="display: none;">
      <div class="naipe-container">
        <button type="button" onclick="router.home()" class="btn-volver">
          ← Volver al catálogo
        </button>

        <div class="naipe-card">
          <img id="naipe-img" src="" alt="Carta">

          <div class="controles-audio">
            <button type="button" onclick="reproducirVoz('es')" class="btn-audio">
              Español
            </button>
            <button type="button" onclick="reproducirVoz('en')" class="btn-audio">
              English
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="creditos">
    <div class="creditos-inner">
      <a href="https://ludolab.cl" target="_blank" rel="noopener noreferrer" class="creditos-logo">
        <img src="./imagenes/logotipo.png" alt="Ludo Lab">
      </a>

      <p class="creditos-tagline">Donde la curiosidad se convierte en conocimiento</p>

      <nav class="creditos-links" aria-label="Enlaces de Ludo Lab">
        <a href="https://ludolab.cl" target="_blank" rel="noopener noreferrer">Inicio</a>
        <a href="https://ludolab.cl/juegos.html" target="_blank" rel="noopener noreferrer">Juegos</a>
        <a href="https://ludolab.cl/quienes-somos.html" target="_blank" rel="noopener noreferrer">Quiénes somos</a>
      </nav>

      <p class="creditos-copy">© 2026 Ludo Lab Chile. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="./js/app.js?v=12" defer></script>
</body>
</html>
